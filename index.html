<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WeatherTM Pro AMOLED</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--glass:rgba(255,255,255,.06);
--border:rgba(255,255,255,.1);
--text:#fff;
--muted:#9ca3af;
--accent:#22d3ee;
}
body{
font-family:Inter,sans-serif;
background:radial-gradient(circle at top,#0f172a,#000);
color:#fff;overflow-x:hidden;min-height:100vh;
}
#bg{
position:fixed;inset:0;z-index:-1;
}
.container{max-width:720px;margin:auto;padding:16px}
.hero{text-align:center;padding:20px 0}
.icon{font-size:5rem;filter:drop-shadow(0 0 20px rgba(255,255,255,.2))}
.temp{font-size:7rem;font-weight:900}
.feels{color:var(--muted)}
.glass{
background:var(--glass);
backdrop-filter:blur(18px);
border:1px solid var(--border);
border-radius:24px;
box-shadow:0 8px 40px rgba(0,0,0,.4);
}
.widgets{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin:20px 0;
}
.card{padding:18px}
.label{font-size:.8rem;color:var(--muted);margin-bottom:8px}
.value{font-size:2rem;font-weight:800}
.hourly{display:flex;gap:10px;overflow:auto;padding:10px}
.hour{min-width:90px;padding:14px;text-align:center}
.forecast-row{
display:flex;justify-content:space-between;
padding:14px;border-bottom:1px solid rgba(255,255,255,.06)
}
.forecast-row:last-child{border-bottom:none}
.fade{animation:fade .8s ease}
@keyframes fade{from{opacity:0;transform:translateY(20px)}to{opacity:1}}
@media(max-width:600px){
.widgets{grid-template-columns:1fr}
.temp{font-size:5rem}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="container fade">
<div class="hero">
<div style="font-weight:900;letter-spacing:2px">WeatherTM PRO</div>
<div id="icon" class="icon">☀️</div>
<div class="temp"><span id="temp">--</span>°</div>
<div id="feels" class="feels">Загрузка...</div>
</div>

<div class="widgets">
<div class="glass card"><div class="label">🧭 ВЕТЕР</div><div id="wind" class="value">--</div></div>
<div class="glass card"><div class="label">💧 ВЛАЖНОСТЬ</div><div id="hum" class="value">--%</div></div>
<div class="glass card"><div class="label">🌅 ВОСХОД</div><div id="sun" class="value">--:--</div></div>
</div>

<div class="glass card">
<div class="label">⏱ ПОЧАСОВОЙ ПРОГНОЗ</div>
<div id="hourly" class="hourly"></div>
</div>

<div class="glass card" style="margin-top:16px">
<div class="label">📅 ПРОГНОЗ НА 7 ДНЕЙ</div>
<div id="forecast"></div>
</div>
</div>

<script>
const API="https://api.open-meteo.com/v1/forecast?latitude=55.44&longitude=65.34&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&hourly=temperature_2m&daily=temperature_2m_max,temperature_2m_min,sunrise&forecast_days=7&timezone=auto";

async function load(){
 const r=await fetch(API);
 const d=await r.json();

 temp.textContent=Math.round(d.current.temperature_2m);
 feels.textContent='Ощущается как '+Math.round(d.current.apparent_temperature)+'°';
 wind.textContent=Math.round(d.current.wind_speed_10m)+' м/с';
 hum.textContent=d.current.relative_humidity_2m+'%';
 sun.textContent=new Date(d.daily.sunrise[0]).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});

 const h=document.getElementById('hourly');
 for(let i=0;i<24;i++){
 h.innerHTML+=`<div class="glass hour">${i}:00<br><b>${Math.round(d.hourly.temperature_2m[i])}°</b></div>`;
 }

 const f=document.getElementById('forecast');
 d.daily.time.forEach((day,i)=>{
  f.innerHTML+=`<div class="forecast-row"><span>${new Date(day).toLocaleDateStringc('ru-RU',{weekday:'long'})}</span><b>${Math.round(d.daily.temperature_2m_max[i])}° / ${Math.round(d.daily.temperature_2m_min[i])}°</b></div>`;
 });
}
load();

const c=document.getElementById('bg'),x=c.getContext('2d');
function rs(){c.width=innerWidth;c.height=innerHeight}
rs();onresize=rs;
const stars=[...Array(120)].map(()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*2}));
(function a(){
x.clearRect(0,0,c.width,c.height);
x.fillStyle='white';
stars.forEach(s=>{x.beginPath();x.arc(s.x,s.y,s.r,0,7);x.fill();s.y+=.15;if(s.y>innerHeight)s.y=0;});
requestAnimationFrame(a);
})();
</script>
</body>
</html>
